schema_version: "1.0"

extension:
  id: ddd
  name: "DDD Architecture and Modeling"
  version: "1.1.0"
  description: "Design product bounded-context architecture and feature domain models for DDD workflows"
  author: Gabriel
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.ddd.architecture
      file: commands/speckit.ddd.architecture.md
      description: "Design or update the product bounded-context architecture in specs/architecture.md"
    - name: speckit.ddd.modeling
      file: commands/speckit.ddd.modeling.md
      description: "Generate a DDD domain model from the current feature specification"

tags:
  - "ddd"
  - "domain-modeling"
  - "architecture"
  - "core"
