schema_version: "1.0"

preset:
  id: "ddd"
  name: "DDD Workflow"
  version: "1.1.0"
  description: "Align spec, architecture, plan, and tasks artifacts around DDD bounded-context constraints"
  author: "spec-kit-core"
  repository: "https://github.com/github/spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "DDD-oriented feature specification template"
      replaces: "spec-template"

    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "DDD-oriented implementation plan template"
      replaces: "plan-template"

    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "DDD-oriented implementation tasks template"
      replaces: "tasks-template"

    - type: "template"
      name: "architecture-template"
      file: "templates/architecture-template.md"
      description: "DDD-oriented product architecture template"

tags:
  - "ddd"
  - "domain-driven-design"
  - "architecture"
  - "workflow"
